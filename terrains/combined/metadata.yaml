# Motion-matched metadata for the six-terrain training scene.
#
# Schema reference: instinctlab/terrains/trimesh/mesh_terrains_cfg.py (MotionMatchedTerrainCfg)
#                   instinctlab/motion_reference/motion_files/terrain_motion.py
#
# - terrain_id MUST be an integer (loader does `int(f["terrain_id"])`).
# - All paths are relative to the `path` field of MotionMatchedTerrainCfg / TerrainMotionCfg,
#   which we set to this directory: `<repo>/terrains/combined/`.
# - The order of `terrains:` defines a difficulty curriculum: index 0 = easiest,
#   index N-1 = hardest, mapped from `difficulty` in [0, 1].
#
# Difficulty ordering chosen for training (not real-world course order):
#   0 ramp           — easiest, single-direction up/down
#   1 symmetrical    — same family, slightly harder
#   2 cross_slope    — uneven double-slope
#   3 s_curve        — adds wz tracking
#   4 hurdling       — requires foot lift; solved by volume_points penalty
#   5 slalom         — lateral footwork, hardest of the 6
#
# stay_still placeholder NPZs are generated by `scripts/make_stay_still_npz.py`.
# Replace them with real retargetted motions later; file names below are fixed contracts.

terrains:
  - terrain_id: 0   # continuous_ramp
    terrain_file: ../centered/1.Continuous Ramp.stl
  - terrain_id: 1   # symmetrical_ramp
    terrain_file: ../centered/5.Symmetrical Ramp.stl
  - terrain_id: 2   # cross_slope
    terrain_file: ../centered/3.Cross Slope.stl
  - terrain_id: 3   # s_curve
    terrain_file: ../centered/7.S-Curve.stl
  - terrain_id: 4   # continuous_hurdling
    terrain_file: ../centered/2.Continuous Hurdling.stl
  - terrain_id: 5   # consecutive_slalom
    terrain_file: ../centered/4.Consecutive Slalom.stl

motion_files:
  - terrain_id: 0
    motion_file: motions/ramp_retargetted.npz
    weight: 1.0
  - terrain_id: 1
    motion_file: motions/symmetrical_ramp_retargetted.npz
    weight: 1.0
  - terrain_id: 2
    motion_file: motions/cross_slope_retargetted.npz
    weight: 1.0
  - terrain_id: 3
    motion_file: motions/s_curve_retargetted.npz
    weight: 1.0
  - terrain_id: 4
    motion_file: motions/hurdling_retargetted.npz
    weight: 1.0
  - terrain_id: 5
    motion_file: motions/slalom_retargetted.npz
    weight: 1.0
